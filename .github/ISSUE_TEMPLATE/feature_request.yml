name: Feature request
description: Suggest an improvement or new capability for TraceSignal.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The forensic/investigative workflow this would improve, and why current tooling falls short.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to similar features in Timesketch, logdata-anomaly-miner, or elsewhere are welcome.
